name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Required for OIDC token exchange with AWS
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1
  TF_VERSION: '1.10.0'

jobs:
  # ──────────────────────────────────────────────────────────────
  # Runs on every push to main AND on workflow_dispatch.
  # Plans the change, exports a JSON plan, and runs a Checkov scan.
  # ──────────────────────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -out=tfplan

      - name: Export plan as JSON
        working-directory: terraform
        run: terraform show -json tfplan > plan.json

      - name: Upload plan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: |
            terraform/plan.json
            terraform/tfplan
          retention-days: 5

      - name: Install Checkov
        run: pip install checkov

      # HIGH and CRITICAL findings fail the pipeline; LOW and MEDIUM are warnings only.
      - name: Checkov scan
        run: checkov -f terraform/plan.json --soft-fail-on LOW,MEDIUM

  # ──────────────────────────────────────────────────────────────
  # Runs only on workflow_dispatch (manual trigger).
  # Applies the planned change after a successful plan job.
  # ──────────────────────────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'workflow_dispatch'
    # Requires a "production" environment configured in repo Settings → Environments
    # with at least one required reviewer. This adds a manual approval gate before apply.
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Download plan artifacts
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: terraform

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply tfplan
